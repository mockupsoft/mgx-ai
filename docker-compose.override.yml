# =============================================================================
# Development Override - docker-compose.override.yml
# =============================================================================
# This file is automatically applied when running docker-compose commands.
# It overrides the main docker-compose.yml for development convenience.
#
# It provides:
# - Development environment settings (MGX_ENV=development, MGX_LOG_LEVEL=debug)
# - Code volume mounts for hot reload
# - Removed build constraints for faster iteration
#
# To skip this file:
#   docker-compose -f docker-compose.yml up -d
#
# To use production settings:
#   MGX_ENV=production docker-compose up -d
#
# =============================================================================

services:
  mgx-ai:
    environment:
      MGX_ENV: development
      MGX_LOG_LEVEL: DEBUG
      DEBUG: "true"
      DEEPSITE_SKIP_AUTH: "true"
      # Sandbox: üretilen projeyi DinD içinde çalıştır (host soketi yerine)
      DOCKER_HOST: tcp://dind:2375
      SANDBOX_IMAGES_PULL_ON_DEMAND: "true"
      # DeepSite Project Runner — port aralığı
      PROJECT_PREVIEW_PORT_MIN: "9100"
      PROJECT_PREVIEW_PORT_MAX: "9999"
      PROJECT_PREVIEW_HOST: "localhost"
    volumes:
      # Mount code directories for hot reload
      - ./backend:/app/backend
      - ./mgx_agent:/app/mgx_agent
      # Project runner için geçici proje dizini
      - /tmp/deepsite_projects:/tmp/deepsite_projects
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend
    # Build cache is kept for faster development builds
    build:
      cache_from:
        - mgx-agent:latest

  # DinD: proje container'ları bu servis üzerinden çalışır
  dind:
    ports:
      # Mevcut sandbox portuna ek olarak proje preview port aralığı
      - "9100-9999:9100-9999"

  # =============================================================================
  # Frontend - Development with hot reload
  # =============================================================================
  mgx-frontend:
    image: node:20-alpine
    container_name: mgx-frontend
    working_dir: /app
    # .next önbelleğini siler ve 3002'de başlatır (eski anonymous volume cache sorunu önlenir)
    command: sh -c "npm install && rm -rf .next && npx next dev -p 3002 -H 0.0.0.0"
    ports:
      - "3002:3002"
    depends_on:
      mgx-ai:
        condition: service_healthy
    volumes:
      # Mount frontend directory for hot reload; .next ayrı volume YOK — host ile senkron
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3002
      # Tarayıcıdan host üzerindeki API
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/stream
      - NEXT_PUBLIC_DEEPSITE_SKIP_AUTH=true
      # Next Route Handlers (bu konteyner içinden) → FastAPI servis adı
      - INTERNAL_API_BASE_URL=http://mgx-ai:8000
    networks:
      - mgx-net
    restart: unless-stopped
    labels:
      - "mgx.service=frontend"
      - "mgx.description=Next.js frontend with hot reload"
